name: CI

on:
  push:
  pull_request:

jobs:
  # Secret scanning — blocks any secret from entering the repo (US2 / FR-003).
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so gitleaks scans past commits too
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  # Lint, type-check, test, and coverage gates are added to this file in the
  # Polish phase (task T044), extending this workflow.
